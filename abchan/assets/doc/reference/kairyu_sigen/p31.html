        <text class="SVGTextShape"><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="847px" font-weight="400">
<tspan class="TextPosition" x="250" y="971"><tspan fill="rgb(0,0,255)" stroke="none" style="white-space: pre">■</tspan><tspan fill="rgb(0,0,0)" stroke="none" style="white-space: pre">隠岐島東方沖の冷・暖水渦の消長</tspan></tspan></tspan></text>
       </g>
      </g>
      <g class="com.sun.star.drawing.CustomShape">
       <g id="id553">
        <rect class="BoundingBox" fill="none" height="13494" stroke="none" width="10222" x="22924" y="2412"/>
        <path d="M 28035,15887 L 22942,15887 22942,2430 33127,2430 33127,15887 28035,15887 Z" fill="none" stroke="rgb(0,0,0)" stroke-linejoin="round" stroke-width="35"/>
        <text class="SVGTextShape">
<tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700" text-decoration="underline">
<tspan class="TextPosition" fill="rgb(255,0,0)" x="23192" y="2978">隠岐東方沖の冷・暖水域</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23192" y="3486">　隠岐東方では、冷・暖水渦が頻繁に出現するこ</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23192" y="3994">とが知られている（Kurita et al., 1999; Watanabe </tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23192" y="4502">et al.,2009 ）。冷・暖水渦は対馬暖流沿岸・沖合</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23192" y="5010">分枝の流路上に発生し、渦の配置が対馬暖流の流</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23192" y="5518">路を変える(Yabe et al., 2021)、冷水渦が対馬暖流</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23192" y="6026">沿岸分枝を強化する(Kaneda et al., 2019)、もしく</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23192" y="6534">は対馬暖流が渦を引き起こす等、相互作用が示唆</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23192" y="7042">されているが、詳細はわかっていない。</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23192" y="7550">　上段右左図は、FRA-ROMSⅡの水温データセッ</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23192" y="8058">トから描いた、冷水域（上段左図）、暖水渦（上</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23192" y="8566">段右図）の平均的な位置を示している。冷水渦は</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23192" y="9074">但馬沿岸に暖水域を押し付けるような分布をして</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23192" y="9582">いる（上段左図） 。このような場合は、対馬暖流</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23192" y="10090">沿岸分枝が強まっている可能性が高い。一方で、暖</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23192" y="10598">水域は冷水渦と比較して沖合に分布する（上段右</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23192" y="11106">図）。暖水渦は渦を中心に時計回りの循環流をも</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23192" y="11614">つ。</tspan></tspan>
<tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700" text-decoration="underline">
<tspan class="TextPosition" fill="rgb(0,0,255)" x="23192" y="12630">低隠岐東方の暖水域分布の長期傾向</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23192" y="13138">　暖水渦の中心が分布しやすい海域（上段図の赤</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23192" y="13646">点）における200m深水温（2～4月平均）の経年変</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23192" y="14154">化を下図にしめした。水温が高い時期は、暖水渦</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23192" y="14662">が発達している時期として検出できる（下図赤矢</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23192" y="15170">印の年）。この時系列からは、２年程度で暖水渦</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23192" y="15678">が消長を繰り返していることが見て取れる。</tspan></tspan></text>
       </g>
