      <g class="com.sun.star.drawing.CustomShape">
       <g id="id274">
        <rect class="BoundingBox" fill="none" height="9430" stroke="none" width="11168" x="22019" y="4285"/>
        <path d="M 27603,13696 L 22037,13696 22037,4303 33168,4303 33168,13696 27603,13696 Z" fill="none" stroke="rgb(0,0,0)" stroke-linejoin="round" stroke-width="35"/>
        <text class="SVGTextShape">
<tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700" text-decoration="underline">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22287" y="4851">水温・塩分プロファイルに基づく水塊クラスタリング</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22287" y="5359">北西太平洋における自動観測ロボット（Argoフロー</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22287" y="5867">ト）の水温・塩分プロファイルのクラスター解析を行い</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22287" y="6375">（Sambe and Suga 2022）、水塊を5つのクラスに分類</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22287" y="6883">した（図a, b） 。各クラスは、そのプロファイルが多く</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22287" y="7391">みられる海域で概ね分けられる。</tspan></tspan>
<tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700" text-decoration="underline">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22287" y="8407">2010年前後における水塊分布変化</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22287" y="8915">黒潮親潮移行域における各クラスの出現割合の変動を調</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22287" y="9423">べると、混合水域に特徴的な水塊の出現割合は、STMW</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22287" y="9931">形成域の水塊の割合が増大した1-2年後に増大すること</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22287" y="10439">がわかった（図c）。</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22287" y="10947">この水塊分布の変動は、黒潮続流北偏やジェットの強化</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22287" y="11455">によって移行域に波及した暖水が、周囲の水塊と混合し</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22287" y="11963">て変質し、混合水域系水塊が形成される過程を反映して</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22287" y="12471">いると考えられる。このような暖水の波及とその後の混</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22287" y="12979">合水域クラスの水塊の増加は繰り返しみられ、2010年</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22287" y="13487">から2015年にも発生していた。</tspan></tspan></text>
       </g>
      </g>
