        <text class="SVGTextShape"><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="847px" font-weight="400">
<tspan class="TextPosition" x="131" y="971"><tspan fill="rgb(0,0,255)" stroke="none" style="white-space: pre">■</tspan><tspan fill="rgb(0,0,0)" stroke="none" style="white-space: pre">親潮域の海洋環境変動がスケトウダラに与える影響</tspan></tspan></tspan></text>
       </g>
      </g>
      <g class="com.sun.star.drawing.CustomShape">
       <g id="id180">
        <rect class="BoundingBox" fill="none" height="15526" stroke="none" width="10145" x="23470" y="2567"/>
        <path d="M 28542,18074 L 23488,18074 23488,2585 33596,2585 33596,18074 28542,18074 Z" fill="none" stroke="rgb(0,0,0)" stroke-linejoin="round" stroke-width="35"/>
        <text class="SVGTextShape"><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23738" y="3133">スケトウダラ太平洋系群は、主に噴火湾周辺海域</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23738" y="3641">で産卵し、噴火湾内へ輸送されて仔魚期を過ごし、</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23738" y="4149">その後の成長を経て加入すると考えられる。</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23738" y="4657">2000年代は、噴火湾周辺が高水温期にあり（左</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23738" y="5165">図）、仔魚の成長や加入にとって好適な海洋環境</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23738" y="5673">であった。</tspan></tspan>
<tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700" text-decoration="underline">
<tspan class="TextPosition" fill="rgb(255,0,0)" x="23738" y="6689">2010年代前半の低い加入量</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23738" y="7197">2000~2015年にかけて、</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23738" y="7705">・ 冬季のオホーツク海における風成循環が徐々に</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23738" y="8213">強化（P1図）</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23738" y="8721">・ 樺太東岸沿いを南下する極低温水の流量が徐々</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23738" y="9229">に増加し、オホーツク海から太平洋に流出する沿</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23738" y="9737">岸親潮の流量が増加（P2図）</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23738" y="10753">→噴火湾周辺が低水温化し（左図とP2図）、</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23738" y="11261">仔魚の成長速度が低下したことで、</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23738" y="11769">2010年代前半の年級群の加入量が減少した。</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23738" y="12785">一方、2016年以降、オホーツク海の風成循環が急</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23738" y="13293">激に弱化し、沿岸親潮の流量が減少した（P2図）。</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23738" y="14309">→噴火湾周辺が高水温化し（左図とP2図） 、</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23738" y="14817">仔魚の成長速度が上昇したことで、2016年以降の</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23738" y="15325">加入量が増加した。</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23738" y="16341">☆このような大気と海洋循環の１０年規模変動に</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23738" y="16849">よって、スケトウダラ太平洋系群の産卵場周辺の</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23738" y="17357">水温が変動し、仔魚の成長や加入に大きく影響す</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23738" y="17865">ると考えられる（Kuroda et al. 2020）。</tspan></tspan></text>
