        <text class="SVGTextShape"><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="847px" font-weight="400">
<tspan class="TextPosition" x="131" y="971"><tspan fill="rgb(0,0,255)" font-family="Walbaum Display Light" stroke="none" style="white-space: pre">■</tspan><tspan fill="rgb(0,0,0)" stroke="none" style="white-space: pre">2000</tspan><tspan fill="rgb(0,0,0)" font-family="游ゴシック, sans-serif" stroke="none" style="white-space: pre">年</tspan><tspan fill="rgb(0,0,0)" stroke="none" style="white-space: pre">~2010</tspan><tspan fill="rgb(0,0,0)" font-family="游ゴシック, sans-serif" stroke="none" style="white-space: pre">年代前半にかけての沿岸親潮の強化</tspan></tspan></tspan></text>
       </g>
      </g>

        <text class="SVGTextShape"><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="706px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="15521" y="2772">2010年代前半は、</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="706px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="15521" y="3619">冬季に樺太東岸を南下する低温水の流量が増加し、</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="706px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="15521" y="4466">オホーツク海から太平洋への沿岸親潮の流出量が増加</tspan></tspan></text>
       </g>
      </g>

<tspan class="TextPosition" fill="rgb(0,0,0)" x="19890" y="6870">噴火湾周辺海域の低温化</tspan></tspan></text>
       </g>
      </g>
      <g class="com.sun.star.drawing.CustomShape">
       <g id="id172">
        <rect class="BoundingBox" fill="none" height="6382" stroke="none" width="17431" x="15840" y="9294"/>
        <path d="M 24555,15657 L 15858,15657 15858,9312 33252,9312 33252,15657 24555,15657 Z" fill="none" stroke="rgb(0,0,0)" stroke-linejoin="round" stroke-width="35"/>
        <text class="SVGTextShape">
<tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700" text-decoration="underline">
<tspan class="TextPosition" fill="rgb(255,0,0)" x="16108" y="9860">2000年〜2010年代前半の沿岸親潮の強化</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="16108" y="10368">2010年-2015年は、冬季にオホーツク海内での反時計回りの海洋循環が強化され、</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="16108" y="10876">樺太東岸を南下する低温水の流量が増加した（上図） 。</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="16108" y="11384">そして、オホーツク海から太平洋へ流出する低温の沿岸親潮の流量が増加し、</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="16108" y="11892">噴火湾周辺や三陸沿岸における冬季水温が低下した（上図）（Kuroda et al. 2020） 。</tspan></tspan>
<tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700" text-decoration="underline">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="16108" y="12908">2016年以降の沿岸親潮の弱化</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="16108" y="13416">2016年以降は、オホーツク海周辺での反時計回りの風応力が急激に弱化し、</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="16108" y="13924">沿岸親潮の流量が減少したことで、噴火湾周辺での冬季水温が上昇した（下図）</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="16108" y="14432">（Kuroda et al. 2020）。</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="16108" y="14940">なお、沿岸親潮の弱化に加え、千島列島沿いを流れる親潮（亜寒帯循環）も弱化傾向に</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="16108" y="15448">あり（下図）、噴火湾周辺の水温上昇を同時に促進した可能性もある。</tspan></tspan></text>
       </g>
