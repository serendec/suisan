        <text class="SVGTextShape"><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="17863" y="8208">北太平洋の中高緯度域では、偏西風と極東風による風応力によって、反時計回り</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="17863" y="8716">の海洋循環（亜寒帯循環）が形成される。親潮は、亜寒帯循環の西縁に位置する</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="17863" y="9224">海流で、千島列島沿いを南下して、低温の海水を、北海道・三陸沖にもたらす。</tspan></tspan>
<tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700" text-decoration="underline">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="17863" y="10240">1980年代の親潮強化</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="17863" y="10748">親潮の南下度合いは、北太平洋中高緯度の海盆スケールの風応力に影響を受ける</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="17863" y="11256">ことが知られており、冬季アリューシャン低気圧が強化された1980年代は 、亜</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="17863" y="11764">寒帯循環の強化に伴い、冬季の親潮の南下が拡大した（Sekine, 1988; Yasuda </tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="17863" y="12272">and Hanawa, 1997等）。</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="17863" y="12780">その結果、三陸・道東沖では、外洋の広い範囲で冬季に低温傾向となった。</tspan></tspan>
<tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700" text-decoration="underline">
<tspan class="TextPosition" fill="rgb(255,0,0)" x="17863" y="13796">2000年〜2010年代前半のオホーツク海周辺の海洋循環強化</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="17863" y="14304">NCEP-NCAR大気再解析値の風応力データから、2000年代は、冬季のアリュー</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="17863" y="14812">シャン低気圧の弱化に伴い（図） 、北太平洋の亜寒帯循環が弱化したことが明ら</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="17863" y="15320">かとなった。一方、オホーツク海やその周辺海域では、反時計回りの風応力が強</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="17863" y="15828">化されており（図）、オホーツク海内での反時計回りの海洋循環が強化されたこ</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="17863" y="16336">とが示唆された（Nakanowatari and Ohshima, 2014; Kuroda et al. 2020）。</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="17863" y="16844">この期間の低温域は、三陸や北海道の沿岸域で顕著であり、1980年代の低温域の</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="17863" y="17352">空間分布とは異なる特徴を有していた。</tspan></tspan></text>
