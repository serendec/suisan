<tspan class="TextPosition" x="250" y="971"><tspan fill="rgb(0,0,255)" stroke="none" style="white-space: pre">■</tspan><tspan fill="rgb(0,0,0)" stroke="none" style="white-space: pre">黒潮流路変動</tspan></tspan></tspan></text>
       </g>
      </g>
      <g class="com.sun.star.drawing.CustomShape">
       <g id="id377">
        <rect class="BoundingBox" fill="none" height="6382" stroke="none" width="24918" x="3759" y="1794"/>
        <path d="M 16218,8157 L 3777,8157 3777,1812 28658,1812 28658,8157 16218,8157 Z" fill="none" stroke="rgb(0,0,0)" stroke-linejoin="round" stroke-width="35"/>
        <text class="SVGTextShape"><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="4027" y="2360">日本南岸を流れる黒潮の流路は、数週間－数ヶ月－数年の時間スケールで変動する。その流路型は、蛇行の有無や岸から流軸ま</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="4027" y="2868">での距離の違いによって、三つのパターンに大別される。一つ目は非大蛇行接岸流路（左図）で、黒潮は日本南岸に沿って、関</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="4027" y="3376">東・東海沖では真っ直ぐに流れる。二つ目は大蛇行流路（中図）で、黒潮流路は東海沖で大きく蛇行し、流軸は南方沖合に離岸</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="4027" y="3884">する。大蛇行流路の判定基準は、「黒潮が潮岬沖で離岸していること」、「東海沖（東経136－140度）の黒潮最南下点が北緯32</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="4027" y="4392">度より安定して南に位置していること」である。三つ目は非大蛇行離岸流路（右図）で、伊豆諸島近海で小さく蛇行して流れる。</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="4027" y="4900">伊豆諸島海域では、黒潮は八丈島の南を通過して流れる特性がある。</tspan></tspan>
<tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700" text-decoration="underline">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="4027" y="5916">2000年以降の春季の黒潮流路変動</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="4027" y="6424">2000年以降の春季の流路型は概ね以下のように分類される。</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="4027" y="6932">　非大蛇行接岸流路：02–04年</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="4027" y="7440">　　　　大蛇行流路：05, 18–23年</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="4027" y="7948">　非大蛇行離岸流路：00–01, 06–17年</tspan></tspan></text>

<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">

<g id="container-id20">

     <g class="Page" ooo:name="page20">
      <g class="com.sun.star.drawing.CustomShape">
       <g id="id393">
        <rect class="BoundingBox" fill="none" height="1266" stroke="none" width="33867" x="0" y="-1"/>
        <text class="SVGTextShape"><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="847px" font-weight="400">
<tspan class="TextPosition" x="250" y="971"><tspan fill="rgb(0,0,255)" stroke="none" style="white-space: pre">■</tspan><tspan fill="rgb(0,0,0)" stroke="none" style="white-space: pre">黒潮内側の冷水塊と暖水波及</tspan></tspan></tspan></text>
       </g>
      </g>
      <g class="com.sun.star.drawing.CustomShape">
       <g id="id394">
        <rect class="BoundingBox" fill="none" height="6890" stroke="none" width="28232" x="2816" y="1358"/>
        <path d="M 16932,8229 L 2834,8229 2834,1376 31029,1376 31029,8229 16932,8229 Z" fill="none" stroke="rgb(0,0,0)" stroke-linejoin="round" stroke-width="35"/>
        <text class="SVGTextShape">
<tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700" text-decoration="underline">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="3084" y="1924">黒潮内側冷水渦</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="3084" y="2432">蛇行により広がった岸と流軸の間の領域はよく黒潮内側（ないそく）域と呼ばれる。この黒潮内側域は、黒潮流軸からその南側に広く分布する高</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="3084" y="2940">温・高塩分の亜熱帯系水塊に比べて低温・低塩分の水塊で覆われる（図）。この冷水塊は低気圧性、すなわち反時計回りの回転をする渦（＝内側</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="3084" y="3448">冷水渦）であり、この時空間変動は東海沖の海洋環境や蛇行の維持・減衰に大きく影響する。</tspan></tspan>
<tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700" text-decoration="underline">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="3084" y="4464">黒潮内側域への暖水波及</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="3084" y="4972">黒潮が大蛇行流路をとる期間中、蛇行の始端（東向きの流れが南向きに曲がる部分）と終端（北向きの流れが東向きに曲がる部分）では黒潮内側</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="3084" y="5480">域に向かってしばしば黒潮系暖水が波及する。この現象は暖水波及と呼ばれ、特に蛇行終端から内側冷水渦の反時計回りの回転に沿う暖水の流れ</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="3084" y="5988">は内側反流とも呼ばれる。暖水波及は強い沿岸流である急潮を引き起こすことでも知られ、定置網等の漁具の破損や流出の原因にもなっている。</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="3084" y="6496">暖水波及は黒潮流軸の曲率の大きな領域で発生しやすく、遠心力による不安定が暖水波及の発達要因に一つと考えられる（Ito et al. 投稿中）。黒</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="3084" y="7004">潮大蛇行の発達に伴い、東海沖では内側冷水渦が発達するものの、渦の縁辺では暖水波及の影響がむしろ大きく、沿岸域は暖水に覆われることが</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="3084" y="7512">多い（左図）。一方、非大蛇行離岸流路の時期には、蛇行の始端と終端は大きな曲率を持たず、不安定が起こりにくいため、沿岸域における暖水</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="3084" y="8020">の影響は小さい（右図）。</tspan></tspan></text>
