        <text class="SVGTextShape">
<tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700" text-decoration="underline">
<tspan class="TextPosition" fill="rgb(255,0,0)" x="24088" y="2473">高水準期（2000-2005年）</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24088" y="2981">マアジ仔稚魚は、</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24088" y="3489">東シナ海南部の産卵域から、</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24088" y="3997">（１）東シナ海上の流れ～九州西方を北上する　</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24088" y="4505">　　対馬暖流源流（左図ピンク細点線矢印）に　</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24088" y="5013">　　よって東シナ海と九州西方海域へ、</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24088" y="5521">（２）黒潮北縁の流れ（左図ピンク太点線矢印）</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24088" y="6029">　　によって太平洋へ</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24088" y="6537">輸送され、それぞれの海域へ新規加入していたと</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24088" y="7045">考えられる。</tspan></tspan>
<tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700" text-decoration="underline">
<tspan class="TextPosition" fill="rgb(0,0,255)" x="24088" y="8061">低水準期（2006-2017年）</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24088" y="8569">　北太平洋上での偏西風と貿易風の分布が変化し、</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24088" y="9077">黒潮の流軸が北上した（右図①ピンク～黒点線矢</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24088" y="9585">印）。それに伴い、九州西方の対馬暖流源流域の</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24088" y="10093">北上流が強化された（右図②黒点線矢印）。　</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24088" y="10601">　九州西方の北上流の強化に伴い、九州西方へ運</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24088" y="11109">ばれるマアジ仔稚魚が増加した（右図③） 。これ</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24088" y="11617">は、以前であれば太平洋へ輸送されていた黒潮北</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24088" y="12125">縁を移動する粒子を、対馬海峡方面へ北上させる</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24088" y="12633">役割を果たす。その結果、太平洋へ輸送されるマ</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24088" y="13141">アジが減った（右図④） 。</tspan></tspan></text>
