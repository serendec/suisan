      <g class="com.sun.star.drawing.CustomShape">
       <g id="id318">
        <rect class="BoundingBox" fill="none" height="1266" stroke="none" width="33867" x="0" y="-1"/>
        <text class="SVGTextShape"><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="847px" font-weight="400">
<tspan class="TextPosition" x="250" y="971"><tspan fill="rgb(0,0,255)" stroke="none" style="white-space: pre">■</tspan><tspan fill="rgb(0,0,0)" stroke="none" style="white-space: pre">混合域の海洋環境変動がマイワシの新規加入に与える影響</tspan></tspan></tspan></text>
       </g>
      </g>
      <g class="com.sun.star.drawing.CustomShape">
       <g id="id319">
        <rect class="BoundingBox" fill="none" height="14002" stroke="none" width="11417" x="22228" y="2528"/>
        <path d="M 27936,16511 L 22246,16511 22246,2546 33626,2546 33626,16511 27936,16511 Z" fill="none" stroke="rgb(0,0,0)" stroke-linejoin="round" stroke-width="35"/>
        <text class="SVGTextShape"><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22496" y="3094">マイワシ太平洋系群は、 資源が減少した1990年代以降、</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22496" y="3602">主に四国沖から関東近海にかけての黒潮内側域で産卵す</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22496" y="4110">る。孵化した仔魚は、黒潮/黒潮続流によって東方へ移送</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22496" y="4618">され、黒潮親潮移行域で成長し、千島列島東方の亜寒帯</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22496" y="5126">域で夏季の索餌期を過ごしたあと、秋冬季に南下して漁</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22496" y="5634">場に加入する沖合加入群を形成すると考えられている。</tspan></tspan>
<tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700" text-decoration="underline">
<tspan class="TextPosition" fill="rgb(255,0,0)" x="22496" y="6650">近年の加入量増加傾向</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22496" y="7158">・2013年以降、産卵が早期化し、産卵量が増加した（主</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22496" y="7666">産卵月：3月→2月; Niino et al. 2021）。成長と加入量の</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22496" y="8174">関係は、近年は成長率に関わらず高加入であることを示</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22496" y="8682">した（Furuichi et al. 2020）。すなわち、早生で低成長</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22496" y="9190">の個体を含む多様な個体が生残する状況が続いている。</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22496" y="10206">・2010年以降、黒潮続流が北偏し（P2の図）、黒潮親潮</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22496" y="10714">移行域への暖水波及が強化されたことで（P3の図）、本</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22496" y="11222">系群の主な餌生物である浮遊性カイアシ類が増加し、本</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22496" y="11730">系群の稚魚にとって、好適な餌環境となった（Miyamoto </tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22496" y="12238">et al. 2022）。</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22496" y="13254">・2000年〜2014年にかけて、黒潮流軸近傍の海面水温は</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22496" y="13762">低下傾向にあり、期間の後半（2010年以降）は、本系群</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22496" y="14270">の仔魚の成長にとって好適な水温環境であったことが示</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22496" y="14778">唆されている（Kuroda et al. 2020）。</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22496" y="15794">→近年の多様な個体が生残する状況に、仔魚期の経験水</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22496" y="16302">温や餌環境の変化が影響している可能性がある。</tspan></tspan></text>
       </g>

<tspan class="TextPosition" fill="rgb(0,0,0)" x="489" y="15151">＝産卵の早期化、早生で低成長の個体の生残</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="847px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="489" y="16167">以下の海洋環境変動が関連している可能性がある：</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="847px" font-weight="700">
<tspan class="TextPosition" x="489" y="17183"><tspan fill="rgb(0,0,0)" stroke="none" style="white-space: pre">・仔魚期の経験水温の</tspan><tspan fill="rgb(0,0,255)" stroke="none" style="white-space: pre">低温化</tspan><tspan fill="rgb(0,0,0)" stroke="none" style="white-space: pre">（最適成長水温に近づく）</tspan></tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="847px" font-weight="700">
<tspan class="TextPosition" x="489" y="18199"><tspan fill="rgb(0,0,0)" stroke="none" style="white-space: pre">・餌環境の</tspan><tspan fill="rgb(197,90,17)" stroke="none" style="white-space: pre">変化</tspan></tspan></tspan></text>
