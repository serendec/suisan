     <g class="Page" ooo:name="page11">
      <g class="com.sun.star.drawing.CustomShape">
       <g id="id261">
        <rect class="BoundingBox" fill="none" height="1266" stroke="none" width="33867" x="0" y="-1"/>
        <text class="SVGTextShape"><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="847px" font-weight="400">
<tspan class="TextPosition" x="250" y="971"><tspan fill="rgb(0,0,255)" font-family="Walbaum Display Light" stroke="none" style="white-space: pre">■</tspan><tspan fill="rgb(0,0,0)" stroke="none" style="white-space: pre">2010</tspan><tspan fill="rgb(0,0,0)" font-family="游ゴシック, sans-serif" stroke="none" style="white-space: pre">年以降の黒潮続流の北偏傾向</tspan></tspan></tspan></text>
       </g>
      </g>
      <g class="com.sun.star.drawing.CustomShape">
       <g id="id262">
        <rect class="BoundingBox" fill="none" height="17558" stroke="none" width="10702" x="22951" y="788"/>
        <path d="M 28302,18327 L 22969,18327 22969,806 33634,806 33634,18327 28302,18327 Z" fill="none" stroke="rgb(0,0,0)" stroke-linejoin="round" stroke-width="35"/>
        <text class="SVGTextShape"><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23219" y="1354">亜熱帯循環の西岸境界流である黒潮は、日本南岸を東</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23219" y="1862">向きに流れた後、房総半島沖から離岸して、太平洋の</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23219" y="2370">沖合を東向きに流れる黒潮続流となります。黒潮と同</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23219" y="2878">様に、黒潮続流も、低緯度から中緯度への熱や卵仔魚</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23219" y="3386">の輸送に重要な役割を果たしています。</tspan></tspan>
<tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700" text-decoration="underline">
<tspan class="TextPosition" fill="rgb(255,0,0)" x="23219" y="4402">2010-2015年の黒潮続流北偏傾向</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23219" y="4910">黒潮続流は、約10年周期で、流路が変動することが</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23219" y="5418">知られています（Qiu and Chen, 2005; Sugimoto et </tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23219" y="5926">al. 2014）。人工衛星で得られた海面高度の情報から</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23219" y="6434">黒潮続流の流軸緯度の変動を抽出したところ、2000-</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23219" y="6942">2004年は北偏傾向だったのに対し、2005年以降は南</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23219" y="7450">偏化していました（左図）。また、 2006-2009年の</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23219" y="7958">流路は、大きな蛇行を伴って東向きに流れる「不安定</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23219" y="8466">流路」という流路形態を取った期間でした（Qiu et </tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23219" y="8974">al. 2020）。2010年になると、黒潮続流は再び北偏傾</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23219" y="9482">向となり、蛇行の少ない比較的直線的な「安定流路」</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23219" y="9990">を取るようになりました。</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23219" y="10498">このような黒潮続流の流路変動は、北東太平洋で生じ</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23219" y="11006">た海面高度の凹凸の変動が、西向きに伝播するロス</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23219" y="11514">ビー波と呼ばれる波動によって、太平洋西岸まで影響</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23219" y="12022">することが要因として考えられています</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23219" y="12530">（Qiu and Chen, 2010, Qiu et al. 2014）。</tspan></tspan>
<tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700" text-decoration="underline">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23219" y="13546">2018年以降の強い北偏傾向</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23219" y="14054">2016年頃、黒潮続流はわずかに南偏化しました</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23219" y="14562">が、2018年以降再び北偏化し、近年は、過去25年で</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23219" y="15070">最も北偏傾向の強い期間となっています（左図）。こ</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23219" y="15578">の北偏傾向は、上記のような約10年周期の変動とは</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23219" y="16086">異なり、2017年に発生した黒潮大蛇行の影響が示唆</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23219" y="16594">されており（Qiu et al. 2020）、過去に長期間の大蛇</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23219" y="17102">行が発生した期間も同様の北偏傾向が報告されていま</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23219" y="17610">す（1975-1980年など: Mizuno and White, 1983; 川</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23219" y="18118">合, 1989）。</tspan></tspan></text>
       </g>
      </g>

<tspan class="TextPosition" fill="rgb(0,0,0)" x="15230" y="9759">人工衛星で捉えた絶対海面高度</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="15230" y="10267">(ADT)の南北勾配が最も大きな</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="15230" y="10775">ADT=1mを黒潮流軸として抽出。</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="15230" y="11283">各期間の春季（4-6月）の平均流路</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="15230" y="11791">を示す。</tspan></tspan></text>
       </g>
      </g>
      <g class="com.sun.star.drawing.CustomShape">
       <g id="id264">
        <rect class="BoundingBox" fill="none" height="3298" stroke="none" width="6494" x="15277" y="15235"/>
        <text class="SVGTextShape"><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="15527" y="15783">ピンク線は、141E~155Eの黒</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="15527" y="16291">潮流軸の平均緯度</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="15527" y="16799">青細線は13ヶ月移動平均</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="15527" y="17307">黒細線は平均値</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="15527" y="17815">黒太線は、 Qiu et al. 2020で</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="15527" y="18323">定義された不安定流路期間</tspan></tspan></text>
       </g>
      </g>

<tspan class="TextPosition" fill="rgb(0,0,0)" x="3493" y="10743">水温・塩分特性</tspan></tspan></text>
       </g>
      </g>
      <g class="com.sun.star.drawing.CustomShape">
       <g id="id274">
        <rect class="BoundingBox" fill="none" height="9430" stroke="none" width="11168" x="22019" y="4285"/>
        <path d="M 27603,13696 L 22037,13696 22037,4303 33168,4303 33168,13696 27603,13696 Z" fill="none" stroke="rgb(0,0,0)" stroke-linejoin="round" stroke-width="35"/>
        <text class="SVGTextShape">
<tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700" text-decoration="underline">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22287" y="4851">水温・塩分プロファイルに基づく水塊クラスタリング</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22287" y="5359">北西太平洋における自動観測ロボット（Argoフロー</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22287" y="5867">ト）の水温・塩分プロファイルのクラスター解析を行い</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22287" y="6375">（Sambe and Suga 2022）、水塊を5つのクラスに分類</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22287" y="6883">した（図a, b） 。各クラスは、そのプロファイルが多く</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22287" y="7391">みられる海域で概ね分けられる。</tspan></tspan>
<tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700" text-decoration="underline">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22287" y="8407">2010年前後における水塊分布変化</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22287" y="8915">黒潮親潮移行域における各クラスの出現割合の変動を調</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22287" y="9423">べると、混合水域に特徴的な水塊の出現割合は、STMW</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22287" y="9931">形成域の水塊の割合が増大した1-2年後に増大すること</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22287" y="10439">がわかった（図c）。</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22287" y="10947">この水塊分布の変動は、黒潮続流北偏やジェットの強化</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22287" y="11455">によって移行域に波及した暖水が、周囲の水塊と混合し</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22287" y="11963">て変質し、混合水域系水塊が形成される過程を反映して</tspan>

<tspan class="TextPosition" x="250" y="971"><tspan fill="rgb(0,0,255)" stroke="none" style="white-space: pre">■</tspan><tspan fill="rgb(0,0,0)" stroke="none" style="white-space: pre">黒潮続流の北偏→水塊変化→餌環境への影響</tspan></tspan></tspan></text>
       </g>
      </g>
      <g class="com.sun.star.drawing.CustomShape">
       <g id="id308">
        <rect class="BoundingBox" fill="none" height="11462" stroke="none" width="16312" x="16629" y="3560"/>
        <path d="M 24785,15003 L 16647,15003 16647,3578 32922,3578 32922,15003 24785,15003 Z" fill="none" stroke="rgb(0,0,0)" stroke-linejoin="round" stroke-width="35"/>
        <text class="SVGTextShape">
<tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700" text-decoration="underline">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="16897" y="4126">2010年前後における浮遊性カイアシ類の群集構造の変化</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="16897" y="4634">調査船調査で得られた同海域の浮遊性カイアシ類の群集構造解析によると、2010–</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="16897" y="5142">15年の間に群集構造は大きく変化していた（Miyamoto et al. 2022）。2010–15年</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="16897" y="5650">以降、黒潮続流分枝にみられる亜熱帯性小型カイアシ類が減少した一方、亜寒帯域</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="16897" y="6158">への暖水波及域にみられる亜寒帯性の大型カイアシ類や暖水性カラヌスが増大して</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="16897" y="6666">いた。黒潮続流の北偏や、亜熱帯域から亜寒帯域への暖水波及の活発化に伴い、近</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="16897" y="7174">年は解析対象海域の餌環境が好転したことが示唆される。</tspan></tspan>
<tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-style="italic" font-weight="700" text-decoration="underline">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="18167" y="8190">Paracalanus parvus s.l.（初期餌料）の分布変化 </tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="18167" y="8698">移行域におけるParacalanus parvus s.l.（マイワシやマサバの初期餌料とな</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="18167" y="9206">る）の出現確率の出現確率と現存量は、太平洋10年規模振動（PDO）指数と</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="18167" y="9714">の対応はなく分布の拡大と縮小を繰り返していた。2010年以前は分布は沿岸</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="18167" y="10222">に限られていた（図a）が、2010年以降は黒潮続流の北偏や暖水波及・</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="18167" y="10730">ジェットの強化等に伴い、分布域が沖合へ拡大していた 。この拡大は、初期</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="18167" y="11238">の餌利用に好影響の可能性がある。</tspan></tspan>
<tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-style="italic" font-weight="700" text-decoration="underline">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="18167" y="12254">Neocalanus plumchrus（稚魚後期餌料） の分布変化</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="18167" y="12762">移行域におけるNeocalanus plumchrus（マイワシやマサバの稚魚後期の餌</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="18167" y="13270">料となる）の出現確率は、PDO指数と対応して変動（PDO正のとき上昇）し</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="18167" y="13778">ていた。一方で、現存量はPDO指数に従わず、近年は減少傾向にあり、2010</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="18167" y="14286">年以前（図a）に比べて2010年以降（図b）は、分布域が北偏していた。こ</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="18167" y="14794">の北偏は、稚魚後期以降の餌利用の遅れ等に影響する可能性がある。 </tspan></tspan></text>
