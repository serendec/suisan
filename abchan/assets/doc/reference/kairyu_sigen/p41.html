        <text class="SVGTextShape">
<tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700" text-decoration="underline">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23735" y="2434">スルメイカ冬季発生系群の資源量減少について</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23735" y="2942">スルメイカの再生産可能域は海面水温により規定</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23735" y="3450">されることが知られており、冬季発生系群の場合、</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23735" y="3958">その主な産卵域は東シナ海であり、産卵時期は12</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23735" y="4466">月〜翌3月である。</tspan></tspan>
<tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700" text-decoration="underline">
<tspan class="TextPosition" fill="rgb(255,0,0)" x="23735" y="5482">資源量増加期</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23735" y="5990">1988/1989年のレジームシフト（中長期的な海洋</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23735" y="6498">環境変化）以降、北西太平洋は温暖期に移行した。</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23735" y="7006">これにより、スルメイカ冬季発生系群の再生産に</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23735" y="7514">とって好適な環境が東シナ海において維持された</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23735" y="8022">ことで、新規加入量・親魚量が高めに維持され、</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23735" y="8530">資源量が安定した。</tspan></tspan>
<tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700" text-decoration="underline">
<tspan class="TextPosition" fill="rgb(0,0,255)" x="23735" y="9546">資源量減少期</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23735" y="10054">2015・2016年に2年連続で東シナ海の水温が下が</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23735" y="10562">り、産卵場の水温環境が不適となった（左図）。</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23735" y="11070">これにより新規加入量が減少し、また両漁期年の</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23735" y="11578">漁獲圧も高かったことから親魚量が大きく減少し</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23735" y="12086">た。その結果、資源量が減少し、その状態が現在</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23735" y="12594">も続いていると考えられている。</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" x="23735" y="13610"><tspan fill="rgb(0,0,255)" font-family="游ゴシック, sans-serif" font-weight="700" stroke="none" style="white-space: pre">　</tspan><tspan fill="rgb(0,0,0)" stroke="none" style="white-space: pre">2015</tspan><tspan fill="rgb(0,0,0)" font-family="游ゴシック, sans-serif" stroke="none" style="white-space: pre">・</tspan><tspan fill="rgb(0,0,0)" stroke="none" style="white-space: pre">2016</tspan><tspan fill="rgb(0,0,0)" font-family="游ゴシック, sans-serif" stroke="none" style="white-space: pre">年には「</tspan><tspan fill="rgb(0,0,0)" stroke="none" style="white-space: pre">PDO</tspan><tspan fill="rgb(0,0,0)" font-family="游ゴシック, sans-serif" stroke="none" style="white-space: pre">（太平洋十年規模振</tspan></tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23735" y="14118">動）指数 」がそれまでの負値から一転して正値と</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23735" y="14626">なっていることから、 2015・2016年の東シナ海</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23735" y="15134">の水温低下の要因としてPDOとの関連が予想され</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23735" y="15642">るが、そのはっきりとした要因はわかっていない </tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23735" y="16150">(岡本ら, 2022)。</tspan></tspan></text>
