     <g class="Page" ooo:name="page13">

        <text class="SVGTextShape"><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="847px" font-weight="400">
<tspan class="TextPosition" x="250" y="971"><tspan fill="rgb(0,0,255)" stroke="none" style="white-space: pre">■</tspan><tspan fill="rgb(0,0,0)" stroke="none" style="white-space: pre">黒潮続流の北偏→水塊変化→餌環境への影響</tspan></tspan></tspan></text>
       </g>
      </g>
      <g class="com.sun.star.drawing.CustomShape">
       <g id="id308">
        <rect class="BoundingBox" fill="none" height="11462" stroke="none" width="16312" x="16629" y="3560"/>
        <path d="M 24785,15003 L 16647,15003 16647,3578 32922,3578 32922,15003 24785,15003 Z" fill="none" stroke="rgb(0,0,0)" stroke-linejoin="round" stroke-width="35"/>
        <text class="SVGTextShape">
<tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700" text-decoration="underline">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="16897" y="4126">2010年前後における浮遊性カイアシ類の群集構造の変化</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="16897" y="4634">調査船調査で得られた同海域の浮遊性カイアシ類の群集構造解析によると、2010–</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="16897" y="5142">15年の間に群集構造は大きく変化していた（Miyamoto et al. 2022）。2010–15年</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="16897" y="5650">以降、黒潮続流分枝にみられる亜熱帯性小型カイアシ類が減少した一方、亜寒帯域</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="16897" y="6158">への暖水波及域にみられる亜寒帯性の大型カイアシ類や暖水性カラヌスが増大して</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="16897" y="6666">いた。黒潮続流の北偏や、亜熱帯域から亜寒帯域への暖水波及の活発化に伴い、近</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="16897" y="7174">年は解析対象海域の餌環境が好転したことが示唆される。</tspan></tspan>
<tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-style="italic" font-weight="700" text-decoration="underline">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="18167" y="8190">Paracalanus parvus s.l.（初期餌料）の分布変化 </tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="18167" y="8698">移行域におけるParacalanus parvus s.l.（マイワシやマサバの初期餌料とな</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="18167" y="9206">る）の出現確率の出現確率と現存量は、太平洋10年規模振動（PDO）指数と</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="18167" y="9714">の対応はなく分布の拡大と縮小を繰り返していた。2010年以前は分布は沿岸</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="18167" y="10222">に限られていた（図a）が、2010年以降は黒潮続流の北偏や暖水波及・</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="18167" y="10730">ジェットの強化等に伴い、分布域が沖合へ拡大していた 。この拡大は、初期</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="18167" y="11238">の餌利用に好影響の可能性がある。</tspan></tspan>
<tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-style="italic" font-weight="700" text-decoration="underline">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="18167" y="12254">Neocalanus plumchrus（稚魚後期餌料） の分布変化</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="18167" y="12762">移行域におけるNeocalanus plumchrus（マイワシやマサバの稚魚後期の餌</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="18167" y="13270">料となる）の出現確率は、PDO指数と対応して変動（PDO正のとき上昇）し</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="18167" y="13778">ていた。一方で、現存量はPDO指数に従わず、近年は減少傾向にあり、2010</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="18167" y="14286">年以前（図a）に比べて2010年以降（図b）は、分布域が北偏していた。こ</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="18167" y="14794">の北偏は、稚魚後期以降の餌利用の遅れ等に影響する可能性がある。 </tspan></tspan></text>
