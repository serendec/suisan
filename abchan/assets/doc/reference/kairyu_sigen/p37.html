       </g>
      </g>
      <g class="com.sun.star.drawing.CustomShape">
       <g id="id723">
        <rect class="BoundingBox" fill="none" height="11462" stroke="none" width="10282" x="23503" y="3259"/>
        <path d="M 28644,14702 L 23521,14702 23521,3277 33766,3277 33766,14702 28644,14702 Z" fill="none" stroke="rgb(0,0,0)" stroke-linejoin="round" stroke-width="35"/>
        <text class="SVGTextShape">
<tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700" text-decoration="underline">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23771" y="3825">ブリの回遊・来遊について</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23771" y="4333">ブリは夏–秋に北海道周辺まで北上回遊し、秋–冬</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23771" y="4841">になると南下回遊すると考えられている。ブリは暖</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23771" y="5349">かい水温を好んで回遊・来遊することが知られてい</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23771" y="5857">る。沖合域に冷水域があると暖水域が押し寄せられ</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23771" y="6365">ている沿岸域に来遊しやすくなり、沿岸域に設置さ</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23771" y="6873">れた定置網で漁獲されるブリが増加すると考えられ</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23771" y="7381">ている。</tspan></tspan>
<tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700" text-decoration="underline">
<tspan class="TextPosition" fill="rgb(0,0,255)" x="23771" y="8397">日本海への来遊量（第1段階）</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23771" y="8905">北海道での漁獲が増加する9–10月もしくはそれ以</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23771" y="9413">降の南下期よりも、北海道周辺に滞在する期間から</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23771" y="9921">南下のごく初期である夏–秋における対馬暖流系の</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23771" y="10429">流勢が強いと、日本海へ南下回遊するブリは増加す</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23771" y="10937">る傾向がある。</tspan></tspan>
<tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700" text-decoration="underline">
<tspan class="TextPosition" fill="rgb(255,0,0)" x="23771" y="11953">日本海中部での来遊の振り分けの変動（第2段階）</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23771" y="12461">能登半島北部に暖水渦、佐渡北方に冷水渦があると、</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23771" y="12969">冷水渦が沖にある海域の方が、ブリの南下回遊の通</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23771" y="13477">り道が沿岸近くに寄せられ、定置網に入網しやすく</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23771" y="13985">なるが、暖水渦が沖にあるときは通り道が沖合まで</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23771" y="14493">広がって、沿岸の定置網には入網しにくくなる。</tspan></tspan></text>
