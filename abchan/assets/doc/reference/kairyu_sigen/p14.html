<tspan class="TextPosition" x="250" y="971"><tspan fill="rgb(0,0,255)" stroke="none" style="white-space: pre">■</tspan><tspan fill="rgb(0,0,0)" stroke="none" style="white-space: pre">黒潮および黒潮続流周辺での水温の中長期変動</tspan></tspan></tspan></text>
       </g>
      </g>
      <g class="com.sun.star.drawing.CustomShape">

        <rect class="BoundingBox" fill="none" height="11970" stroke="none" width="9967" x="23502" y="3302"/>

        <text class="SVGTextShape">
<tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700" text-decoration="underline">
<tspan class="TextPosition" fill="rgb(255,0,0)" x="23770" y="3868">2000年以降の黒潮流軸周辺の低温化</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23770" y="4376">2000年以降、東海・関東南岸の黒潮流軸から内</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23770" y="4884">側域周辺の広範囲の海域において、冬季および春</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23770" y="5392">季の海面水温が長期的（15年程度）に低下する傾</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23770" y="5900">向が報告されています（上図, Kuroda et al. </tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23770" y="6408">2020）。</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23770" y="7424">この日本周辺の低温化の一因として、中央ユーラ</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23770" y="7932">シア大陸における冬季の極端な気温低下が考えら</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23770" y="8440">れており（Kuroda et al. 2020）、北極海の海氷</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23770" y="8948">減少がその極端な気温低下に影響した可能性が指</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23770" y="9456">摘されていますが（Mori et al. 2019ほか）、未</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23770" y="9964">だに完全な理解は得られていません。</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23770" y="10980">また、太平洋10年規模振動（PDO）指数は、 </tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23770" y="11488">1998年から2013年まで、概ね負となっており</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23770" y="11996">（下図）、従来の考え方では、日本周辺の海面水</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23770" y="12504">温は高温化する期間と考えられてきました。この</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23770" y="13012">ように、2000年から2010年代前半にかけて、日</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23770" y="13520">本周辺の黒潮・黒潮続流近傍の海面水温は、これ</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23770" y="14028">までの典型的な変動パターンとは異なる要因によ</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23770" y="14536">り、低温化したことが指摘されています</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="23770" y="15044">（Kuroda et al. 2020）</tspan></tspan></text>
