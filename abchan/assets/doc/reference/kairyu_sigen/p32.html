        <text class="SVGTextShape"><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="847px" font-weight="400">
<tspan class="TextPosition" x="249" y="935"><tspan fill="rgb(0,0,255)" stroke="none" style="white-space: pre">■</tspan><tspan fill="rgb(0,0,0)" stroke="none" style="white-space: pre">日本海西部の渦がズワイガニの新規加入量に与える影響</tspan></tspan></tspan></text>
       </g>
      </g>
      <g class="com.sun.star.drawing.CustomShape">
       <g id="id594">
        <rect class="BoundingBox" fill="none" height="13494" stroke="none" width="9967" x="23865" y="1885"/>
        <path d="M 28848,15360 L 23883,15360 23883,1903 33813,1903 33813,15360 28848,15360 Z" fill="none" stroke="rgb(0,0,0)" stroke-linejoin="round" stroke-width="35"/>
        <text class="SVGTextShape">
<tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700" text-decoration="underline">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24133" y="2451">ズワイガニ幼生について</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24133" y="2959">ズワイガニは隠岐島周辺の海底に多く分布する。</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24133" y="3467">冬に、親ガニから生まれたズワイガニ幼生は、海</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24133" y="3975">水と比較して軽いのに加え海面付近まで自発的に</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24133" y="4483">浮上する。その後、成長とともに深場へ沈み、３</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24133" y="4991">か月程度で海底に着底する(Kon, 1982)。</tspan></tspan>
<tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700" text-decoration="underline">
<tspan class="TextPosition" fill="rgb(0,0,255)" x="24133" y="6007">資源量減少期</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24133" y="6515">隠岐島から能登半島西岸にかけて、対馬暖流が海</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24133" y="7023">底地形に沿って流れる（左図灰色矢印）。隠岐島</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24133" y="7531">東方が冷水域で占められているときは、この対馬</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24133" y="8039">暖流が強化される（左図）。</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24133" y="8547">このような状況の時には、孵化したズワイガニ幼</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24133" y="9055">生が、浮上→沈降する間に対馬暖流に沿って能登</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24133" y="9563">半島以東へ流される（左図青系矢印）。その結果、</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24133" y="10071">生育に有利な主分布域の隠岐島周辺へとどまるこ</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24133" y="10579">とができず、資源量減少につながる。</tspan></tspan>
<tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700" text-decoration="underline">
<tspan class="TextPosition" fill="rgb(255,0,0)" x="24133" y="11595">資源量増加期</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24133" y="12103">隠岐島東方に暖水域が分布する際には、暖水域に</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24133" y="12611">沿って時計回りの循環流が形成される（右図）。</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24133" y="13119">このような状況の時には、孵化したズワイガニ幼</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24133" y="13627">生が暖水域に捕らわれ、隠岐東方を時計回りに循</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24133" y="14135">環する間に沈降する。その結果、生育に有利な主</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24133" y="14643">分布域の隠岐島周辺の海底へ着底することができ、</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24133" y="15151">資源量増加につながる。</tspan></tspan></text>
       </g>
      </g>
