        <text class="SVGTextShape">
<tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700" text-decoration="underline">
<tspan class="TextPosition" fill="rgb(255,0,0)" x="17388" y="6089">伊豆諸島北部海域で黒潮が接岸している時期（黒潮接岸流路、黒潮大蛇行流路）</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="17388" y="6597">マサバ卵・仔魚（春）期に、産卵域である関東・東海沖に黒潮や暖水塊が接近する</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="17388" y="7105">と、</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="17388" y="7613">（１）仔魚の成長に最適な高水温が持続して高成長となり、</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="17388" y="8121">（２）仔魚は黒潮の流れに乗って効果的に輸送されるため、</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" x="17388" y="8629"><tspan fill="rgb(255,0,0)" stroke="none" style="white-space: pre">高加入</tspan><tspan fill="rgb(0,0,0)" font-weight="400" stroke="none" style="white-space: pre">が期待される。</tspan></tspan></tspan>
<tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700" text-decoration="underline">
<tspan class="TextPosition" fill="rgb(0,0,255)" x="17388" y="9645">伊豆諸島北部海域で黒潮が離岸している時期（黒潮非大蛇行離岸流路）</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="17388" y="10153">マサバ卵・仔魚（春）期に、産卵域である関東・東海沖から黒潮が離れると、</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="17388" y="10661">（１）仔魚の成長に最適でない低水温が持続して低成長となり、</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="17388" y="11169">（２）仔魚は黒潮の流れに乗って輸送されにくいため、</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700">
<tspan class="TextPosition" x="17388" y="11677"><tspan fill="rgb(0,0,255)" stroke="none" style="white-space: pre">低成長・低加入</tspan><tspan fill="rgb(0,0,0)" font-weight="400" stroke="none" style="white-space: pre">が予測される。</tspan></tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="17388" y="12693">＊高成長と高加入の関係：Kamimura et al. (2015)。</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="17388" y="13201">＊黒潮流路と成長の関係：Kaneko et al. (2019)ほか2000－2019年の解析結果。</tspan></tspan></text>
