        <path d="M 5172,5679 L 304,5679 304,2382 10040,2382 10040,5679 5172,5679 Z" fill="rgb(197,224,180)" stroke="none"/>
        <text class="SVGTextShape"><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="635px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="554" y="3142">北太平洋上での</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="635px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="554" y="3904">偏西風・貿易風の分布変化</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="635px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="554" y="4666">↓</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="635px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="554" y="5428">黒潮流軸の北上(Liu et al., 2021)</tspan></tspan></text>
       </g>
      </g>
      <g class="com.sun.star.drawing.CustomShape">
       <g id="id481">
        <rect class="BoundingBox" fill="none" height="18037" stroke="none" width="8703" x="24929" y="714"/>
        <path d="M 29280,18732 L 24947,18732 24947,732 33613,732 33613,18732 29280,18732 Z" fill="none" stroke="rgb(0,0,0)" stroke-linejoin="round" stroke-width="35"/>
        <text class="SVGTextShape">
<tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700" text-decoration="underline">
<tspan class="TextPosition" fill="rgb(255,0,0)" x="25197" y="1280">黒潮の北上</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="25197" y="1788">黒潮は、偏西風と貿易風によって形作られ</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="25197" y="2296">る風成循環である。1998～2012年の間に、</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="25197" y="2804">偏西風と貿易風の分布が変わり、黒潮の流</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="25197" y="3312">軸が北上した(Liu et al., 2021)。</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="25197" y="3820">その結果、日本の太平洋岸に黒潮流軸が接</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="25197" y="4328">近し、それに伴って高潮位領域が形成され</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="25197" y="4836">るようになった（左模式図）。</tspan></tspan>
<tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700" text-decoration="underline">
<tspan class="TextPosition" fill="rgb(0,0,255)" x="25197" y="5852">海況モデルに見られた黒潮の北上</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="25197" y="6360">水産機構運用の海況モデルから、黒潮の北</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="25197" y="6868">上の様子を抽出した。その結果、黒潮流軸</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="25197" y="7376">は、2000～2005年平均（右図青線）に比</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="25197" y="7884">べ、2006～2017年平均（右図緑線）の方</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="25197" y="8392">が北上しており、かつ　高潮位領域が本州</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="25197" y="8900">南岸に形作られていた（右図暖色系領域）。</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="25197" y="9408">これは左図の模式図と一致する特徴であり、</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="25197" y="9916">海況モデルで黒潮の北上が再現されていた</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="25197" y="10424">ことを示す。</tspan></tspan>
<tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700" text-decoration="underline">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="25197" y="11440">対馬暖流の強化</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="25197" y="11948">右図では、本州南岸の高潮位領域が九州西</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="25197" y="12456">方・対馬海峡東水道を経由して日本海まで</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="25197" y="12964">伸びている。これは、対馬暖流の流勢が強</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="25197" y="13472">化されていることを意味している。</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="25197" y="14488">１）本州南岸の高潮位領域が「沿岸捕捉</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="25197" y="14996">波」として九州西方まで伝播する(Kida et </tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="25197" y="15504">al., 2021; Usui et al., 2021)</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="25197" y="16012">２）対馬海峡を挟んだ、日本海内部と外部</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="25197" y="16520">領域（右図四角）の潮位差が大きくなる。</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="25197" y="17028">３）上記潮位差で駆動されている対馬海峡</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="25197" y="17536">通過流量が増加し、対馬暖流の流量が増幅</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="25197" y="18044">した</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="25197" y="18552">と説明される。</tspan></tspan></text>
       </g>
      </g>

       </g>

      <g class="com.sun.star.drawing.CustomShape">

        <text class="SVGTextShape">
<tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700" text-decoration="underline">
<tspan class="TextPosition" fill="rgb(255,0,0)" x="22684" y="7120">対馬暖流流量の増加に伴う九州西方北上流の強化</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22684" y="7628">九州西方では、対馬暖流の源流にあたる北上流が</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22684" y="8136">春先以降見られる。水産機構運用の海況モデルで</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22684" y="8644">は、この北上流が2000～2005年（左図ピンク楕円</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22684" y="9152">内の流れ）に比べ、2006～2017年の方（右図ピン</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22684" y="9660">ク楕円内の流れ）が強まっていた。</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22684" y="10676">対馬暖流の増幅にともない、九州西方の対馬暖流</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22684" y="11184">源流域の北上流が強化された結果と考えられる。</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22684" y="12200">これは、対馬海峡通過流の増幅に伴い、九州西方</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22684" y="12708">から対馬海峡へ連行される海水量が増えた結果、</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="22684" y="13216">と解釈できる。</tspan></tspan></text>
