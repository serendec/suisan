<tspan class="TextPosition" x="250" y="971"><tspan fill="rgb(0,0,255)" stroke="none" style="white-space: pre">■</tspan><tspan fill="rgb(0,0,0)" stroke="none" style="white-space: pre">対馬暖流の流勢、日本海</tspan><tspan fill="rgb(0,0,0)" stroke="none" style="white-space: pre">中</tspan><tspan fill="rgb(0,0,0)" stroke="none" style="white-space: pre">–東部の渦</tspan></tspan></tspan></text>
       </g>
      </g>
      <g class="com.sun.star.drawing.CustomShape">
       <g id="id707">
        <rect class="BoundingBox" fill="none" height="9938" stroke="none" width="9967" x="23818" y="3259"/>
        <path d="M 28801,13178 L 23836,13178 23836,3277 33766,3277 33766,13178 28801,13178 Z" fill="none" stroke="rgb(0,0,0)" stroke-linejoin="round" stroke-width="35"/>
        <text class="SVGTextShape">
<tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700" text-decoration="underline">
<tspan class="TextPosition" fill="rgb(255,0,0)" x="24086" y="3825">対馬暖流の流勢</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24086" y="4333">（左上図）日本海の日本沿岸に沿って流れる対馬</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24086" y="4841">暖流と、その下流の津軽暖流は、一続きの対馬暖</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24086" y="5349">流系として連動している部分がある（Kida et. al., </tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24086" y="5857">2016）。（左下図）験潮所で測定されている水位</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24086" y="6365">データより計算した深浦−函館の水位差が大きい</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24086" y="6873">ほど、津軽暖流は強く流れるため、この水位差</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24086" y="7381">データを利用すれば対馬暖流系の流勢を指標でき</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24086" y="7889">る。対馬暖流系は数年規模で強弱して変動するこ</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24086" y="8397">とがわかる。</tspan></tspan>
<tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="700" text-decoration="underline">
<tspan class="TextPosition" fill="rgb(0,0,255)" x="24086" y="9413">日本海中–東部の渦</tspan></tspan><tspan class="TextParagraph" font-family="游ゴシック, sans-serif" font-size="423px" font-weight="400">
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24086" y="9921">（右上図） 能登・佐渡沖合域では、時計回りの循</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24086" y="10429">環流を伴う暖水渦と反時計回りの循環流となる冷</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24086" y="10937">水渦が頻繁に出現する（Wagawa et al., 2020）。</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24086" y="11445">このような渦は、人工衛星が測定した海面高度</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24086" y="11953">データを用いて主成分分析を行うことで抽出でき</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24086" y="12461">る。（右下図）このような暖・冷水渦は経年変動</tspan>
<tspan class="TextPosition" fill="rgb(0,0,0)" x="24086" y="12969">が大きいこともわかる。</tspan></tspan></text>
