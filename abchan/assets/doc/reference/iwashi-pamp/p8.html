１）極東マイワシとカリフォルニアマイワシ
</p>
<p>
　極東マイワシとカリフォルニアマイワシ（米国西岸水域に分布回遊するマイワシの一種）の漁獲傾向は概ね一致した変動を示しています。このことは、北太平洋に共通した大規模な環境変動と関係があると考えられます。
