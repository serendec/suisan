<p>
４）親潮南下と再生産成功率の関係
</p>
<p>
　親潮の南下度合と再生産成功率（漁場に加入した０歳魚量／親魚量）の関係を示したものです。親潮の南下が強ければマイワシの再生産成功率がそれに応じて高いことが示されています。
</p>
<p>
　なお、１９８０年代半ばは親魚量が多いことから密度効果が働き、見かけ上は再生産成功率が南下の度合に応じて高くなっていませんが、実際は高いレベルの加入が見られています。
</p>
