<div  class="center"><img src="./fig03.png"></div>
<div class="main_text">
<p>
日本周辺には二つの暖流が流れています。太平洋側を黒潮が、日本海側を対馬暖流が流れています。対馬暖流は黒潮から分かれて派生した水と、東シナ海のさまざまな水塊とが集まって形成されていると考えられています。海洋環境の変動は、いわし類の資源変動に関係していると考えられ、海洋環境の変動の要因として、気象との関係や冷水や暖水塊の配置、および暖流の流量や流れのパターンの変化が考えられます。これらのことを総合的に解明するためには長期間にわたり海洋環境の調査を継続することが必要です。
</p>
